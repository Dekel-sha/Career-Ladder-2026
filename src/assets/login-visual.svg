<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0A2A5E"/>
      <stop offset="1" stop-color="#0073EA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 520) rotate(120) scale(760 760)">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="150" y1="1200" x2="980" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg)"/>
  <circle cx="820" cy="520" r="640" fill="url(#glow)"/>

  <!-- Career ladder abstract lines -->
  <path d="M210 1280 C 380 1050, 520 980, 720 820 C 880 690, 980 560, 1040 460" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>
  <path d="M240 1320 C 410 1090, 560 1015, 760 855 C 910 730, 1000 610, 1070 500" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>

  <!-- Steps -->
  <g fill="#FFFFFF" fill-opacity="0.14">
    <rect x="250" y="1180" width="230" height="18" rx="9"/>
    <rect x="330" y="1090" width="230" height="18" rx="9"/>
    <rect x="410" y="1005" width="230" height="18" rx="9"/>
    <rect x="490" y="925" width="230" height="18" rx="9"/>
    <rect x="570" y="850" width="230" height="18" rx="9"/>
  </g>
</svg>
